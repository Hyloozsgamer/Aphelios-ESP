# APHELIOS BUILD SYSTEM YML (Season 2026)
# ==========================================

build_paths:
  dps_sustained:
    description: "Maximizes DPS in long fights against tanks or slow dive compositions."
    core:
      - item: "Kraken Slayer"
        priority: 1
        notes: "Brutal synergy with Severum Q and fast auto-attacks."
      - item: "Infinity Edge"
        priority: 2
        notes: "Mandatory critical multiplier. Scales late game."
      - item: "Lord Dominik's Regards"
        priority: 3
        notes: "Against tanks and high armor scalings."
    situational:
      - item: "Bloodthirster"
        notes: "If you need extreme sustain against Poke compositions."
      - item: "Guardian Angel"
        notes: "Against high burst assassins (Zed, Talon)."

  burst_assassination:
    description: "To erase soft targets with Calibrum and Infernum R combinations."
    core:
      - item: "The Collector"
        priority: 1
        notes: "Lethality to punish early/mid game and secure kills."
      - item: "Essence Reaver"
        priority: 2
        notes: "Spellblade for spamming abilities and burst damage."
      - item: "Yun Tal Wildarrows"
        priority: 3
        notes: "Bleed damage from critical strikes."
    situational:
      - item: "Maw of Malmortius"
        notes: "If enemy AP has high burst (LeBlanc, Syndra)."
      - item: "Edge of Night"
        notes: "Spell shield to prevent key initiations."

  hyper_carry_critical:
    description: "The classic 100% crit build to destroy at minute 30."
    core:
      - item: "Statikk Shiv"
        priority: 1
        notes: "Wave clear and magical AOE damage."
      - item: "Infinity Edge"
        priority: 2
        notes: "Damage Core."
      - item: "Phantom Dancer"
        priority: 3
        notes: "Movement speed and extreme Attack Speed for Crescendum."

runes:
  main_tree: "Precision"
  key_stone: "Lethal Tempo"
  notes: "Lethal Tempo reduces the return time of Crescendum projectiles, allowing exponential close-range DPS."
  minor_runes:
    - "Presence of Mind"
    - "Legend: Bloodline"
    - "Cut Down"
  sub_tree: "Domination"
  sub_runes:
    - "Eyeball Collection"
    - "Treasure Hunter"

skill_order:
  max_sequence: ["Q", "W", "E"]
  stat_priority: ["Attack Damage", "Attack Speed", "Lethality"]
  notes: "Max AD first for ability scaling, then AS to multiply DPS."
